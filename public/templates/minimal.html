<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume - Minimal</title>
</head>
<body class="tpl-minimal" style="margin: 0 auto; padding: 12px 16px; font-family: Georgia, 'Times New Roman', serif; font-size: 10.5px; line-height: 1.3; color: #333; background: #fff; max-width: 8.5in;">
  <div style="margin-bottom: 10px;">
    <h1 style="margin: 0 0 6px 0; font-size: 14px; font-weight: 600; line-height: 1.2;">{{name}}</h1>
    <p style="margin: 0; font-size: 10.5px; color: #666; line-height: 1.3;">{{email}} · {{phone}} · {{location}}</p>
    {{contact_urls_block}}
  </div>

  <div style="border-top: 1px solid #e5e5e5; padding-top: 8px; margin-bottom: 10px;">
    <h2 style="margin: 0 0 8px 0; font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; line-height: 1.3;">Summary</h2>
    <p style="margin: 0; line-height: 1.3;">{{summary}}</p>
  </div>

  <div style="border-top: 1px solid #e5e5e5; padding-top: 8px; margin-bottom: 10px;">
    <h2 style="margin: 0 0 8px 0; font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; line-height: 1.3;">Experience</h2>
    <div style="line-height: 1.3;">{{experience}}</div>
  </div>

  {{education_block}}
  {{certifications_block}}

  <div style="border-top: 1px solid #e5e5e5; padding-top: 8px;">
    <h2 style="margin: 0 0 8px 0; font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; line-height: 1.3;">Skills</h2>
    <div style="margin: 0; line-height: 1.3;">{{skills}}</div>
  </div>
</body>
</html>
