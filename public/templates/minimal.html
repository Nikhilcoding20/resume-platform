<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume - Minimal</title>
</head>
<body style="margin: 0; padding: 60px 80px; font-family: Georgia, 'Times New Roman', serif; font-size: 11pt; color: #333; background: #fff; max-width: 8.5in; margin: 0 auto;">
  <div style="margin-bottom: 48px;">
    <h1 style="margin: 0 0 8px 0; font-size: 24pt; font-weight: 400;">{{name}}</h1>
    <p style="margin: 0; font-size: 11pt; color: #666;">{{email}} · {{phone}} · {{location}}</p>
    {{contact_urls_block}}
  </div>

  <div style="border-top: 1px solid #e5e5e5; padding-top: 36px; margin-bottom: 48px;">
    <h2 style="margin: 0 0 16px 0; font-size: 11pt; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;">Summary</h2>
    <p style="margin: 0; line-height: 1.7;">{{summary}}</p>
  </div>

  <div style="border-top: 1px solid #e5e5e5; padding-top: 36px; margin-bottom: 48px;">
    <h2 style="margin: 0 0 16px 0; font-size: 11pt; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;">Experience</h2>
    <div style="line-height: 1.7;">{{experience}}</div>
  </div>

  {{education_block}}
  {{certifications_block}}

  <div style="border-top: 1px solid #e5e5e5; padding-top: 36px;">
    <h2 style="margin: 0 0 16px 0; font-size: 11pt; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;">Skills</h2>
    <div style="margin: 0; line-height: 1.7;">{{skills}}</div>
  </div>
</body>
</html>
