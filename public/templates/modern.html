<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume - Modern</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; display: flex; min-height: 100vh;">
  <div style="width: 200px; background: #2563eb; color: #fff; padding: 40px 24px; flex-shrink: 0;">
    <h1 style="margin: 0 0 24px 0; font-size: 22pt; font-weight: 600;">{{name}}</h1>
    <p style="margin: 0 0 8px 0; font-size: 10pt; line-height: 1.5;">{{email}}</p>
    <p style="margin: 0 0 8px 0; font-size: 10pt; line-height: 1.5;">{{phone}}</p>
    <p style="margin: 0; font-size: 10pt; line-height: 1.5;">{{location}}</p>
    {{sidebar_urls}}
  </div>

  <div style="flex: 1; padding: 40px; background: #fff; color: #333;">
    <h2 style="margin: 0 0 12px 0; font-size: 12pt; font-weight: 600; color: #2563eb;">Summary</h2>
    <p style="margin: 0 0 24px 0; font-size: 11pt; line-height: 1.5;">{{summary}}</p>

    <h2 style="margin: 0 0 12px 0; font-size: 12pt; font-weight: 600; color: #2563eb;">Experience</h2>
    <div style="margin-bottom: 24px; font-size: 11pt; line-height: 1.5;">{{experience}}</div>

    {{education_block}}
    {{certifications_block}}

    <h2 style="margin: 0 0 12px 0; font-size: 12pt; font-weight: 600; color: #2563eb;">Skills</h2>
    <div style="margin: 0; font-size: 11pt; line-height: 1.5;">{{skills}}</div>
  </div>
</body>
</html>
