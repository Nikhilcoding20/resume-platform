<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume - Modern</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    body.tpl-modern {
      margin: 0;
      padding: 0;
      font-family: Inter, Calibri, Arial, sans-serif;
      font-size: 10pt;
      line-height: 1.35;
      color: #1a1a1a;
      background: #fff;
    }
    .modern-layout {
      display: flex;
      align-items: stretch;
      min-height: 100vh;
    }
    .modern-sidebar {
      width: 30%;
      min-width: 168px;
      max-width: 32%;
      background: #1e3a5f;
      color: #fff;
      padding: 18pt 12pt;
      flex-shrink: 0;
      border-right: 1px solid #152a45;
    }
    .modern-sidebar .resume-name {
      margin: 0 0 12pt 0;
      font-size: 24pt;
      font-weight: 700;
      line-height: 1.15;
      color: #ffffff;
    }
    .modern-sidebar .sidebar-label {
      margin: 14pt 0 6pt 0;
      font-size: 9pt;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
    }
    .modern-main {
      flex: 1;
      min-width: 0;
      padding: 18pt 16pt;
      background: #fff;
    }
  </style>
</head>
<body class="tpl-modern">
  <div class="modern-layout">
    <aside class="modern-sidebar">
      <h1 class="resume-name">{{name}}</h1>
      <p class="sidebar-label">Contact</p>
      {{sidebar_contact}}
      <p class="sidebar-label">Skills</p>
      {{sidebar_skills}}
      <p class="sidebar-label">Certifications</p>
      {{sidebar_certifications}}
    </aside>
    <main class="modern-main">
      {{summary_block}}
      <div class="resume-experience-block resume-section">
        <h2 class="resume-section-heading modern-heading" style="margin:0 0 6px 0;font-size:10.5pt;font-weight:700;text-transform:uppercase;color:#1e3a5f;border-bottom:2px solid #1e3a5f;padding-bottom:3px;">Experience</h2>
        {{experience}}
      </div>
      {{education_block}}
    </main>
  </div>
</body>
</html>
