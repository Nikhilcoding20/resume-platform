<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume - Modern</title>
  <style>
    body.tpl-modern {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 10pt;
      line-height: 1.35;
      color: #1a1a1a;
      background: #fff;
    }
    table.modern-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    td.modern-sidebar-cell {
      width: 30%;
      vertical-align: top;
      background: #1e3a5f;
      color: #ffffff;
      padding: 16pt 12pt;
    }
    td.modern-main-cell {
      width: 70%;
      vertical-align: top;
      background: #ffffff;
      color: #1a1a1a;
      padding: 16pt 14pt;
    }
    td.modern-sidebar-cell h1.resume-name {
      margin: 0 0 12pt 0;
      font-size: 22pt;
      font-weight: bold;
      line-height: 1.15;
      color: #ffffff;
    }
    td.modern-sidebar-cell p.sidebar-label {
      margin: 12pt 0 4pt 0;
      font-size: 9pt;
      font-weight: bold;
      text-transform: uppercase;
      color: #ffffff;
    }
    td.modern-main-cell h2.modern-heading {
      margin: 0 0 6pt 0;
      font-size: 10.5pt;
      font-weight: bold;
      text-transform: uppercase;
      color: #1e3a5f;
      border-bottom: 2px solid #1e3a5f;
      padding-bottom: 3px;
    }
  </style>
</head>
<body class="tpl-modern">
  <table class="modern-table" cellpadding="0" cellspacing="0" border="0" width="100%">
    <tr>
      <td class="modern-sidebar-cell" valign="top">
        <h1 class="resume-name">{{name}}</h1>
        <p class="sidebar-label">Contact</p>
        {{sidebar_contact}}
        <p class="sidebar-label">Skills</p>
        {{sidebar_skills}}
        <p class="sidebar-label">Certifications</p>
        {{sidebar_certifications}}
      </td>
      <td class="modern-main-cell" valign="top">
        {{summary_block}}
        {{experience_block}}
        {{education_block}}
      </td>
    </tr>
  </table>
</body>
</html>
