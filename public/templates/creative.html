<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume - Creative</title>
</head>
<body class="tpl-creative" style="margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; font-size: 10.5px; line-height: 1.3; color: #333;">
  <header style="background: #1e3a5f; color: #fff; padding: 14px 16px; text-align: center;">
    <h1 style="margin: 0; font-size: 14px; font-weight: 700; line-height: 1.2;">{{name}}</h1>
    <p style="margin: 6px 0 0 0; font-size: 10px; opacity: 0.9; line-height: 1.3;">{{email}} | {{phone}} | {{location}}</p>
    {{contact_urls_block}}
  </header>

  <div class="creative-body-wrap" style="display: flex; flex-wrap: wrap; padding: 10px 12px;">
    <div style="flex: 1; min-width: 240px; padding: 0 10px 10px 0;">
      <div class="creative-section" style="border-left: 4px solid #1e3a5f; padding-left: 12px; margin-bottom: 10px;">
        <h2 style="margin: 0 0 8px 0; font-size: 12px; font-weight: 600; color: #1e3a5f; text-transform: uppercase; line-height: 1.3;">Summary</h2>
        <p style="margin: 0; font-size: 10.5px; line-height: 1.3;">{{summary}}</p>
      </div>
    </div>

    <div style="flex: 1; min-width: 240px; padding: 0 0 10px 10px;">
      <div class="creative-section" style="border-left: 4px solid #2563eb; padding-left: 12px; margin-bottom: 10px;">
        <h2 style="margin: 0 0 8px 0; font-size: 12px; font-weight: 600; color: #2563eb; text-transform: uppercase; line-height: 1.3;">Experience</h2>
        <div style="font-size: 10.5px; line-height: 1.3;">{{experience}}</div>
      </div>

      {{education_block}}
      {{certifications_block}}

      <div class="creative-section" style="border-left: 4px solid #059669; padding-left: 12px;">
        <h2 style="margin: 0 0 8px 0; font-size: 12px; font-weight: 600; color: #059669; text-transform: uppercase; line-height: 1.3;">Skills</h2>
        <div style="margin: 0; font-size: 10.5px; line-height: 1.3;">{{skills}}</div>
      </div>
    </div>
  </div>
</body>
</html>
