<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume - Creative</title>
  <style>
    .tpl-creative * { box-sizing: border-box; }
    .tpl-creative .creative-layout {
      display: flex;
      align-items: stretch;
      min-height: 100vh;
      width: 100%;
    }
    .tpl-creative .creative-col-left {
      flex: 0 0 35%;
      max-width: 35%;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .tpl-creative .creative-col-right {
      flex: 1 1 65%;
      width: 65%;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
      color: #333;
      padding: 10px 14px;
    }
    .tpl-creative .creative-left-header {
      background: #1e3a5f;
      color: #fff;
      padding: 12px 14px;
      flex-shrink: 0;
    }
    .tpl-creative .creative-left-header h1 {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
    }
    .tpl-creative .creative-left-header .creative-contact-line {
      margin: 6px 0 0 0;
      font-size: 10px;
      opacity: 0.95;
      line-height: 1.4;
    }
    .tpl-creative .creative-left-header .contact-line {
      margin: 4px 0 0 0;
      font-size: 10px;
      line-height: 1.4;
      color: rgba(255, 255, 255, 0.92);
    }
    .tpl-creative .creative-left-body {
      flex: 1;
      padding: 10px 12px;
      background: #f8fafc;
      min-height: 0;
    }
    .tpl-creative .creative-panel {
      padding-left: 12px;
      border-left: 4px solid;
      margin-bottom: 10px;
    }
    .tpl-creative .creative-panel:last-child {
      margin-bottom: 0;
    }
    .tpl-creative .creative-panel-summary {
      border-left-color: #1e3a5f;
    }
    .tpl-creative .creative-panel-summary .creative-h2 {
      color: #1e3a5f;
    }
    .tpl-creative .creative-panel-skills {
      border-left-color: #059669;
    }
    .tpl-creative .creative-panel-skills .creative-h2 {
      color: #059669;
    }
    .tpl-creative .creative-panel-experience {
      border-left-color: #2563eb;
    }
    .tpl-creative .creative-panel-experience .creative-h2 {
      color: #2563eb;
    }
    .tpl-creative .creative-h2 {
      margin: 0 0 6px 0;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      line-height: 1.3;
    }
    .tpl-creative .creative-panel-summary p {
      margin: 0;
    }
    .tpl-creative .creative-col-right .resume-education-block {
      border-left: 4px solid #1e3a5f;
      padding-left: 12px;
      margin-bottom: 10px;
    }
    .tpl-creative .creative-col-right .resume-education-block > h2 {
      color: #1e3a5f;
      margin-top: 0;
    }
    .tpl-creative .creative-col-right .resume-certifications-block {
      border-left: 4px solid #059669;
      padding-left: 12px;
      margin-bottom: 0;
    }
    .tpl-creative .creative-col-right .resume-certifications-block > h2 {
      color: #059669;
      margin-top: 0;
    }
  </style>
</head>
<body class="tpl-creative" style="margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; font-size: 10px; line-height: 1.4; color: #333;">
  <div class="creative-layout">
    <aside class="creative-col-left">
      <div class="creative-left-header">
        <h1>{{name}}</h1>
        <p class="creative-contact-line">{{email}} | {{phone}} | {{location}}</p>
        {{contact_urls_block}}
      </div>
      <div class="creative-left-body">
        <div class="creative-panel creative-panel-summary">
          <h2 class="creative-h2">Summary</h2>
          <p>{{summary}}</p>
        </div>
        <div class="creative-panel creative-panel-skills">
          <h2 class="creative-h2">Skills</h2>
          <div>{{skills}}</div>
        </div>
      </div>
    </aside>
    <main class="creative-col-right">
      <div class="creative-panel creative-panel-experience">
        <h2 class="creative-h2">Experience</h2>
        <div>{{experience}}</div>
      </div>
      {{education_block}}
      {{certifications_block}}
    </main>
  </div>
</body>
</html>
