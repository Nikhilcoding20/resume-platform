<!DOCTYPE html>
<html lang="en" style="margin:0;padding:0;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume - Creative</title>
</head>
<body class="tpl-creative" style="margin:0;padding:0;width:100%;background-color:#ffffff;font-family:'Source Sans 3',Arial,Helvetica,sans-serif;font-size:9pt;line-height:1.3;color:#1a1a1a;">
  <header class="creative-header" style="margin:0 0 8pt 0;">
    <h1 class="resume-name" style="margin:0 0 6pt 0;font-family:'Playfair Display',Georgia,serif;font-size:28pt;font-weight:700;line-height:1.05;color:#1e3a5f;">{{name}}</h1>
    <p class="resume-contact" style="margin:0;">{{contact_line}}</p>
  </header>

  {{summary_block}}

  <div class="resume-experience-block resume-section" style="margin-bottom:6pt;">
    {{experience_block}}
  </div>

  {{skills_block}}
  {{education_block}}
  {{certifications_block}}
</body>
</html>
