<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume - Creative</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; color: #333;">
  <header style="background: #1e3a5f; color: #fff; padding: 48px; text-align: center;">
    <h1 style="margin: 0; font-size: 32pt; font-weight: 700;">{{name}}</h1>
    <p style="margin: 12px 0 0 0; font-size: 12pt; opacity: 0.9;">{{email}} | {{phone}} | {{location}}</p>
    {{contact_urls_block}}
  </header>

  <div style="display: flex; flex-wrap: wrap; padding: 32px;">
    <div style="flex: 1; min-width: 280px; padding: 0 16px 24px 0;">
      <div style="border-left: 4px solid #1e3a5f; padding-left: 16px; margin-bottom: 24px;">
        <h2 style="margin: 0 0 12px 0; font-size: 11pt; font-weight: 600; color: #1e3a5f; text-transform: uppercase;">Summary</h2>
        <p style="margin: 0; font-size: 11pt; line-height: 1.5;">{{summary}}</p>
      </div>
    </div>

    <div style="flex: 1; min-width: 280px; padding: 0 0 24px 16px;">
      <div style="border-left: 4px solid #2563eb; padding-left: 16px; margin-bottom: 24px;">
        <h2 style="margin: 0 0 12px 0; font-size: 11pt; font-weight: 600; color: #2563eb; text-transform: uppercase;">Experience</h2>
        <div style="font-size: 11pt; line-height: 1.5;">{{experience}}</div>
      </div>

      {{education_block}}
      {{certifications_block}}

      <div style="border-left: 4px solid #059669; padding-left: 16px;">
        <h2 style="margin: 0 0 12px 0; font-size: 11pt; font-weight: 600; color: #059669; text-transform: uppercase;">Skills</h2>
        <div style="margin: 0; font-size: 11pt; line-height: 1.5;">{{skills}}</div>
      </div>
    </div>
  </div>
</body>
</html>
