<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume - ATS</title>
  <style>
    body.tpl-ats {
      margin: 0 auto;
      padding: 0;
      font-family: Georgia, 'Times New Roman', Times, serif;
      font-size: 10pt;
      line-height: 1.25;
      color: #000;
      background: #fff;
      max-width: 8.5in;
      box-sizing: border-box;
    }
    body.tpl-ats * {
      color: #000 !important;
      font-family: Georgia, 'Times New Roman', Times, serif;
    }
    body.tpl-ats .resume-header {
      text-align: left;
      margin: 0 0 8pt 0;
    }
    body.tpl-ats .resume-name {
      font-size: 24pt;
      font-weight: bold;
      margin: 0;
      line-height: 1.1;
      text-align: left;
    }
    body.tpl-ats .ats-name-rule {
      border: none;
      border-top: 0.5pt solid #000;
      margin: 4pt 0 6pt 0;
      width: 100%;
      height: 0;
    }
    body.tpl-ats .resume-contact {
      font-size: 10pt;
      font-weight: normal;
      line-height: 1.3;
      margin: 0;
      text-align: left;
    }
    body.tpl-ats .resume-section-block {
      margin-bottom: 6pt;
    }
    body.tpl-ats .resume-section-heading.ats-heading {
      margin: 0;
      font-size: 11pt;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0;
      color: #000;
      line-height: 1.2;
    }
    body.tpl-ats .ats-section-rule {
      border: none;
      border-top: 0.5pt solid #000;
      margin: 2pt 0 3pt 0;
      width: 100%;
      height: 0;
    }
    body.tpl-ats .resume-bullets.ats-bullets {
      margin: 1pt 0 0 0;
    }
    body.tpl-ats .ats-bullet-row {
      display: flex;
      align-items: flex-start;
      gap: 0.35em;
      margin-bottom: 2pt;
      padding-left: 0.12in;
      line-height: 1.2;
      font-size: 9.5pt;
    }
    body.tpl-ats .ats-bullet-row:last-child {
      margin-bottom: 0;
    }
    body.tpl-ats .ats-bullet-marker {
      flex-shrink: 0;
    }
    body.tpl-ats .ats-bullet-text {
      flex: 1;
      min-width: 0;
    }
    body.tpl-ats .experience-item {
      margin-bottom: 6pt;
    }
    body.tpl-ats .experience-item:last-child {
      margin-bottom: 0;
    }
    body.tpl-ats .ats-job-title-row,
    body.tpl-ats .ats-job-company-row,
    body.tpl-ats .ats-edu-degree-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      width: 100%;
    }
    body.tpl-ats .ats-job-company-row {
      font-size: 9.5pt;
      font-weight: normal;
      margin: 0 0 2pt 0;
    }
    body.tpl-ats .ats-edu-inst-row {
      margin: 0;
      font-size: 10pt;
      font-weight: normal;
    }
    body.tpl-ats .skill-group {
      margin: 0 0 2pt 0;
      font-size: 9.5pt;
      line-height: 1.2;
    }
    body.tpl-ats .skill-group strong {
      font-weight: bold;
    }
    body.tpl-ats .project-item {
      margin-bottom: 6pt;
    }
    body.tpl-ats .project-item:last-child {
      margin-bottom: 0;
    }
    body.tpl-ats .ats-project-name {
      font-weight: bold;
      margin: 0 0 2pt 0;
      font-size: 10pt;
    }
  </style>
</head>
<body class="tpl-ats">
  <header class="resume-header">
    <h1 class="resume-name">{{name}}</h1>
    <hr class="ats-name-rule" />
    <p class="resume-contact">{{contact_line}}</p>
  </header>

  {{summary_block}}
  {{experience_block}}
  {{education_block}}
  {{projects_block}}
  {{skills_block}}
  {{certifications_block}}
</body>
</html>
