<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume - ATS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    body.tpl-ats {
      margin: 0 auto;
      padding: 0;
      font-family: Georgia, Garamond, 'Times New Roman', serif;
      font-size: 10.5pt;
      line-height: 1.25;
      color: #000;
      background: #fff;
      max-width: 8.5in;
      box-sizing: border-box;
    }
    body.tpl-ats * { color: #000 !important; }
    body.tpl-ats .resume-name {
      font-size: 17pt;
      font-weight: bold;
      margin: 0 0 6pt 0;
      line-height: 1.15;
    }
    body.tpl-ats .resume-contact {
      font-size: 10.5pt;
      line-height: 1.3;
      margin: 0;
    }
    body.tpl-ats .resume-bullets.ats-bullets {
      list-style: none;
      padding-left: 0.25in;
      margin: 2pt 0 0 0;
    }
    body.tpl-ats .resume-bullets.ats-bullets li.ats-bullet-item {
      display: block;
      list-style: none;
      padding-left: 0.14in;
      text-indent: -0.14in;
      margin-bottom: 3pt;
      line-height: 1.25;
      font-size: 10.5pt;
    }
  </style>
</head>
<body class="tpl-ats">
  <header style="margin-bottom: 12pt;">
    <h1 class="resume-name">{{name}}</h1>
    <p class="resume-contact">{{contact_line}}</p>
    {{contact_urls_block}}
  </header>

  {{summary_block}}

  <div class="resume-experience-block resume-section">
    <h2 class="resume-section-heading ats-heading" style="margin:12px 0 6px 0;font-size:11pt;font-weight:bold;text-transform:uppercase;border-bottom:1pt solid #000;padding-bottom:3px;">EXPERIENCE</h2>
    {{experience}}
  </div>

  {{education_block}}
  {{certifications_block}}

  {{skills_block}}
</body>
</html>
