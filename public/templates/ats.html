<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume - ATS</title>
</head>
<body class="tpl-ats" style="margin: 0 auto; padding: 12px 16px; font-family: Arial, sans-serif; font-size: 10.5px; line-height: 1.3; color: #000; background: #fff; max-width: 8.5in;">
  <div style="margin-bottom: 10px;">
    <h1 style="margin: 0 0 4px 0; font-size: 14px; font-weight: bold; line-height: 1.2;">{{name}}</h1>
    <p style="margin: 0; font-size: 10.5px; line-height: 1.3;">{{email}} | {{phone}} | {{location}}</p>
    {{contact_urls_block}}
  </div>

  <h2 style="margin: 8px 0 4px 0; font-size: 12px; font-weight: bold; border-bottom: 1px solid #000; padding-bottom: 2px; line-height: 1.3;">SUMMARY</h2>
  <p style="margin: 0 0 10px 0; line-height: 1.3;">{{summary}}</p>

  <h2 style="margin: 8px 0 4px 0; font-size: 12px; font-weight: bold; border-bottom: 1px solid #000; padding-bottom: 2px; line-height: 1.3;">EXPERIENCE</h2>
  <div style="margin-bottom: 10px;">{{experience}}</div>

  {{education_block}}
  {{certifications_block}}

  <h2 style="margin: 8px 0 4px 0; font-size: 12px; font-weight: bold; border-bottom: 1px solid #000; padding-bottom: 2px; line-height: 1.3;">SKILLS</h2>
  <div style="margin: 0;">{{skills}}</div>
</body>
</html>
