<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume - ATS</title>
</head>
<body style="margin: 0; padding: 40px; font-family: Arial, sans-serif; font-size: 11pt; color: #000; background: #fff; max-width: 8.5in; margin: 0 auto;">
  <div style="margin-bottom: 16px;">
    <h1 style="margin: 0 0 4px 0; font-size: 18pt; font-weight: bold;">{{name}}</h1>
    <p style="margin: 0; font-size: 11pt;">{{email}} | {{phone}} | {{location}}</p>
  </div>

  <h2 style="margin: 16px 0 8px 0; font-size: 12pt; font-weight: bold; border-bottom: 1px solid #000; padding-bottom: 2px;">SUMMARY</h2>
  <p style="margin: 0 0 16px 0; line-height: 1.4;">{{summary}}</p>

  <h2 style="margin: 16px 0 8px 0; font-size: 12pt; font-weight: bold; border-bottom: 1px solid #000; padding-bottom: 2px;">EXPERIENCE</h2>
  <div style="margin-bottom: 16px;">{{experience}}</div>

  <h2 style="margin: 16px 0 8px 0; font-size: 12pt; font-weight: bold; border-bottom: 1px solid #000; padding-bottom: 2px;">SKILLS</h2>
  <p style="margin: 0;">{{skills}}</p>
</body>
</html>
