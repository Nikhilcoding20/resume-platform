<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume - ATS</title>
  <style>
    body.tpl-ats {
      margin: 0 auto;
      padding: 0;
      font-family: Georgia, Garamond, 'Times New Roman', serif;
      font-size: 10pt;
      line-height: 1.25;
      color: #000;
      background: #fff;
      max-width: 8.5in;
      box-sizing: border-box;
    }
    body.tpl-ats * {
      color: #000 !important;
      font-family: Georgia, Garamond, 'Times New Roman', serif;
    }
    body.tpl-ats .resume-header {
      text-align: center;
      margin-bottom: 6pt;
    }
    body.tpl-ats .resume-name {
      font-size: 24pt;
      font-weight: bold;
      margin: 0 0 6pt 0;
      line-height: 1.15;
      text-align: center;
    }
    body.tpl-ats .resume-contact {
      font-size: 10pt;
      line-height: 1.25;
      margin: 0;
      text-align: center;
      white-space: nowrap;
    }
    body.tpl-ats .resume-section-block {
      margin-bottom: 8pt;
    }
    body.tpl-ats .resume-section-heading.ats-heading {
      margin: 8pt 0 0 0;
      font-size: 11pt;
      font-weight: bold;
      text-transform: none;
      letter-spacing: 0;
      color: #000;
      line-height: 1.3;
    }
    body.tpl-ats .ats-section-rule {
      border: none;
      border-top: 0.5pt solid #000;
      margin: 0 0 4pt 0;
      width: 100%;
      height: 0;
    }
    body.tpl-ats .resume-bullets.ats-bullets {
      margin: 2pt 0 0 0;
    }
    body.tpl-ats .ats-bullet-row {
      display: flex;
      align-items: flex-start;
      gap: 0.4em;
      margin-bottom: 1.5pt;
      padding-left: 0.15in;
      line-height: 1.25;
      font-size: 10pt;
    }
    body.tpl-ats .ats-bullet-marker {
      flex-shrink: 0;
    }
    body.tpl-ats .ats-bullet-text {
      flex: 1;
      min-width: 0;
    }
    body.tpl-ats .skill-group {
      margin: 0 0 4pt 0;
      font-size: 10pt;
      line-height: 1.3;
    }
    body.tpl-ats .skill-group strong {
      font-weight: bold;
    }
    body.tpl-ats .experience-item {
      margin-bottom: 5pt;
    }
  </style>
</head>
<body class="tpl-ats">
  <header class="resume-header">
    <h1 class="resume-name">{{name}}</h1>
    <p class="resume-contact">{{contact_line}}</p>
  </header>

  {{summary_block}}

  {{experience_block}}

  {{education_block}}
  {{certifications_block}}

  {{skills_block}}
</body>
</html>
